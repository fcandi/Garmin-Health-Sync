name: Attest release assets

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Release tag to attest
                required: true
                default: "0.9.6"

jobs:
    attest:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
            attestations: write

        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.tag }}

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Attest release assets
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css
