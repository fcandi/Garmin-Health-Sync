name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"
            - "[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci
            - run: npm run build

            - name: Attest release assets
              uses: actions/attest-build-provenance@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Create release and upload assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Mark -beta.N tags as pre-releases automatically.
                  PRERELEASE=""
                  case "${{ github.ref_name }}" in
                      *-beta.*) PRERELEASE="--prerelease" ;;
                  esac
                  gh release create "${{ github.ref_name }}" main.js manifest.json styles.css \
                      --title "${{ github.ref_name }}" --notes-file CHANGELOG.md $PRERELEASE
